routing:
  mode: "fallback"
  health_check:
    window: "5m"
    error_threshold: 5

retry:
  max_attempts: 3
  initial_backoff: "200ms"
  max_backoff: "5s"
  backoff_multiplier: 2.0

circuit_breaker:
  failure_threshold: 5
  success_threshold: 2
  timeout: "30s"
  window: "60s"
